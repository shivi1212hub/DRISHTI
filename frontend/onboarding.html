<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface": "#faf9f8",
                    "on-primary-fixed": "#001c39",
                    "secondary-container": "#91f77e",
                    "outline": "#717783",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#f4f3f2",
                    "surface-container-high": "#e9e8e7",
                    "inverse-surface": "#2f3130",
                    "surface-dim": "#dadad9",
                    "on-primary-fixed-variant": "#004883",
                    "on-secondary-fixed-variant": "#005303",
                    "on-tertiary-fixed-variant": "#743500",
                    "on-tertiary-fixed": "#311300",
                    "primary": "#005faa",
                    "surface-container-highest": "#e3e2e1",
                    "on-error": "#ffffff",
                    "surface-bright": "#faf9f8",
                    "tertiary-fixed": "#ffdbc8",
                    "on-error-container": "#93000a",
                    "inverse-primary": "#a3c9ff",
                    "on-secondary-fixed": "#002200",
                    "tertiary": "#974700",
                    "on-secondary-container": "#007306",
                    "background": "#faf9f8",
                    "primary-fixed": "#d3e3ff",
                    "on-tertiary-container": "#ffffff",
                    "surface-container": "#efeeed",
                    "tertiary-container": "#bc5b00",
                    "on-surface-variant": "#404752",
                    "outline-variant": "#c0c7d4",
                    "on-tertiary": "#ffffff",
                    "primary-fixed-dim": "#a3c9ff",
                    "on-primary": "#ffffff",
                    "error-container": "#ffdad6",
                    "error": "#ba1a1a",
                    "secondary-fixed-dim": "#79dd68",
                    "on-primary-container": "#ffffff",
                    "tertiary-fixed-dim": "#ffb689",
                    "secondary-fixed": "#94fa81",
                    "surface-tint": "#0060ab",
                    "on-surface": "#1a1c1c",
                    "on-background": "#1a1c1c",
                    "surface-variant": "#e3e2e1",
                    "inverse-on-surface": "#f1f0ef",
                    "secondary": "#006e06",
                    "primary-container": "#0078d4",
                    "on-secondary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .mica-effect {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.75);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Background Decorative Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary-container/20 blur-[120px] pointer-events-none"></div>
<!-- Main Onboarding Container -->
<main class="w-full max-w-md z-10">
<!-- Top Branding (Hidden Shell logic: Supressed for login, so we use a simple header) -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="visibility">visibility</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface mb-2">Drishti AI</h1>
<p class="text-on-surface-variant font-medium">Your sanctuary for digital eye wellness.</p>
</div>
<!-- Elevate Mica Card -->
<div class="mica-effect surface-container-lowest rounded-[2rem] shadow-[0px_8px_32px_rgba(0,0,0,0.04)] p-8 md:p-10 border border-white/40">
<header class="mb-8">
<h2 class="text-xl font-bold text-on-surface">Secure Onboarding</h2>
<p class="text-sm text-on-surface-variant mt-1">Start your journey to better vision.</p>
</header>
<form class="space-y-6">
<!-- Full Name Field -->
<div class="space-y-2">
<label class="text-sm font-semibold text-on-surface block px-1" for="name">Full Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="person">person</span>
</div>
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-highest transition-all outline-none" id="name" name="name" placeholder="e.g. Alex Rivera" type="text"/>
</div>
</div>
<!-- Email Address Field -->
<div class="space-y-2">
<label class="text-sm font-semibold text-on-surface block px-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
</div>
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-highest transition-all outline-none" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Primary Action -->
<div class="pt-2">
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-xl shadow-[0px_4px_16px_rgba(0,95,170,0.25)] hover:shadow-[0px_8px_24px_rgba(0,95,170,0.35)] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Get Started
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<footer class="mt-8 pt-6 border-t border-surface-container-highest text-center">
<p class="text-xs text-on-surface-variant leading-relaxed">
                    By continuing, you agree to Drishti AI's 
                    <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a> and 
                    <a class="text-primary font-semibold hover:underline" href="#">Terms of Service</a>.
                </p>
</footer>
</div>
<!-- Secondary Navigation/Links -->
<div class="mt-8 text-center flex flex-col gap-4">
<p class="text-sm text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Sign In</a>
</p>
<div class="flex items-center justify-center gap-6 mt-4">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center cursor-pointer hover:bg-surface-dim transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="key">key</span>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center cursor-pointer hover:bg-surface-dim transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="fingerprint">fingerprint</span>
</div>
</div>
</div>
</main>
<!-- Bottom Decorative Image/Visual -->
<div class="absolute bottom-10 left-1/2 -translate-x-1/2 w-full max-w-3xl opacity-20 pointer-events-none px-6">
<img alt="Cybersecurity and vision tech" class="w-full h-32 object-cover rounded-[3rem] grayscale" data-alt="abstract close-up of a high-tech glowing blue interface lens with intricate circuitry patterns and soft bokeh lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuARB_ZZ3SiVFmsOdzDxzb2b3Pb19Wn2-kCRB_A6zWD0E87GqVCFQ2Z-cB56dqUrWE3keiomFK6vCJ662Vqu_7uY7EC4somTcUxUKD-zWx5gUFeZ0uTz2j1QXR37rcAr_i5fUYHA3UNMqDQ6QkK2mOmYKm-UuLp0Ie2G6aCENQ3st9W3JKoFlqhGAFMDhkzke8OY0KyWJ1_fejc0KGRY1xxb_jmEYh7zRtaeAJOhEZRABDLWYhLUwM4pYVAtWGgc9QPE67M_grLDXarf"/>
</div>
</body></html>
